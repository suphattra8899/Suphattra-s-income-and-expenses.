// ── DONUT ─────────────────────────────────────────────────────
function Donut({pct,size=110}){
  const r=44,circ=2*Math.PI*r,f=Math.min(pct,100);
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" style={{transform:"rotate(-90deg)"}}>
      <circle cx="50" cy="50" r={r} fill="none" stroke="#EEF0FB" strokeWidth="10"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke="#FF6B8A" strokeWidth="10"
        strokeDasharray={`${(f/100)*circ} ${circ}`} strokeLinecap="round"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke="#5C5FEF" strokeWidth="10"
        strokeDasharray={`${Math.max(0,(100-f)/100*circ)} ${circ}`}
        strokeDashoffset={-((f/100)*circ)} strokeLinecap="round"/>
    </svg>
  );
}

// ── MANAGE CATEGORIES TAB ─────────────────────────────────────
function ManageCatsTab({cats,setCats}){
  const [activeType,setActiveType]=useState("expense");
  const [showAdd,setShowAdd]=useState(false);
  const [editTarget,setEditTarget]=useState(null); // {id,type}
  const [showPicker,setShowPicker]=useState(false);

  const addCat=(type,cat)=>{
    setCats(prev=>({...prev,[type]:[...prev[type],cat]}));
  };
  const deleteCat=(type,id)=>{
    setCats(prev=>({...prev,[type]:prev[type].filter(c=>c.id!==id)}));
  };
  const updateIcon=(type,id,icon)=>{
    setCats(prev=>({...prev,[type]:prev[type].map(c=>c.id===id?{...c,icon}:c)}));
  };

  return(
    <div style={{padding:"0 16px"}}>
      {/* Type tabs */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["expense","💸 รายจ่าย"],["income","💰 รายรับ"]].map(([k,v])=>(
          <button key={k} onClick={()=>setActiveType(k)} style={pill(activeType===k)}>{v}</button>
        ))}
      </div>

      {/* Category list */}
      <div style={{...card,padding:"6px 8px",marginBottom:14}}>
        {cats[activeType].map((c,i)=>(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 10px",borderBottom:i<cats[activeType].length-1?"1px solid #F0F2F8":"none"}}>
            <button onClick={()=>{setEditTarget({id:c.id,type:activeType});setShowPicker(true);}}
              style={{width:42,height:42,borderRadius:12,background:"#F8F9FF",border:"1.5px dashed #C7D2FE",fontSize:22,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {c.icon}
            </button>
            <span style={{flex:1,fontSize:15,fontWeight:700,color:"#1A1D2E"}}>{c.name}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {c.custom&&(
                <span style={{fontSize:11,color:"#8B5CF6",background:"#EDE9FE",padding:"3px 8px",borderRadius:99,fontWeight:700}}>กำหนดเอง</span>
              )}
              {c.custom&&(
                <button onClick={()=>deleteCat(activeType,c.id)}
                  style={{width:30,height:30,borderRadius:99,background:"#FFF0F3",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  ✕
                </button>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Add button */}
      <button onClick={()=>setShowAdd(true)}
        style={{width:"100%",padding:"15px",borderRadius:16,border:"2px dashed #C7D2FE",background:"#F8F9FF",color:"#5C5FEF",fontFamily:"inherit",fontWeight:800,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:20}}>＋</span> เพิ่มหมวดหมู่{activeType==="income"?"รายรับ":"รายจ่าย"}
      </button>

      {showAdd&&<AddCatSheet type={activeType} onClose={()=>setShowAdd(false)} onAdd={cat=>addCat(activeType,cat)}/>}
      {showPicker&&editTarget&&(
        <EmojiPicker
          onSelect={e=>updateIcon(editTarget.type,editTarget.id,e)}
          onClose={()=>{setShowPicker(false);setEditTarget(null);}}
        />
      )}
    </div>
  );
}

// ── ADD TX SHEET ──────────────────────────────────────────────
function AddSheet({cats,onClose,onAdd}){
  const [form,setForm]=useState({type:"expense",amount:"",catId:"",note:"",date:today()});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const curCats = cats[form.type];
  const selCat = curCats.find(c=>c.id===form.catId)||curCats[0];

  const handleAdd=()=>{
    const amt=parseFloat(form.amount);
    if(!amt||amt<=0||!selCat) return;
    onAdd({id:Date.now(),type:form.type,amount:amt,category:selCat.name,icon:selCat.icon,note:form.note,date:form.date});
    onClose();
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(26,29,46,.5)",backdropFilter:"blur(4px)"}} onClick={onClose}/>
      <div style={{position:"relative",background:"#fff",borderRadius:"24px 24px 0 0",padding:"8px 20px 40px",maxWidth:520,width:"100%",margin:"0 auto",boxShadow:"0 -8px 40px rgba(92,95,239,.12)",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:"#E5E7EB",borderRadius:99,margin:"12px auto 20px"}}/>
        <div style={{fontWeight:800,fontSize:18,color:"#1A1D2E",marginBottom:20}}>เพิ่มรายการ</div>

        {/* Type toggle */}
        <div style={{display:"flex",gap:8,marginBottom:20,background:"#F0F2F8",borderRadius:16,padding:4}}>
          {[["expense","💸 รายจ่าย","#FFF0F3","#EF4444"],["income","💰 รายรับ","#F0FDF4","#22C55E"]].map(([k,label,bg,fg])=>(
            <button key={k} onClick={()=>{set("type",k);set("catId","");}}
              style={{flex:1,padding:"12px 0",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:14,
                background:form.type===k?bg:"transparent",color:form.type===k?fg:"#9CA3AF",transition:"all .2s"}}>
              {label}
            </button>
          ))}
        </div>

        {/* Amount */}
        <div style={{marginBottom:16}}>
          <label style={lbl}>จำนวนเงิน (บาท)</label>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontWeight:800,fontSize:18,color:"#9CA3AF"}}>฿</span>
            <input type="number" placeholder="0.00" value={form.amount} onChange={e=>set("amount",e.target.value)}
              style={{...inp,paddingLeft:36,fontSize:22,fontWeight:800,color:"#1A1D2E"}}/>
          </div>
        </div>

        {/* Category chips */}
        <div style={{marginBottom:16}}>
          <label style={lbl}>หมวดหมู่ ({curCats.length} หมวด)</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {curCats.map(c=>{
              const sel = selCat&&selCat.id===c.id;
              return(
                <button key={c.id} onClick={()=>set("catId",c.id)}
                  style={{padding:"8px 14px",borderRadius:99,border:sel?"2px solid #5C5FEF":"1.5px solid #E5E7EB",
                    background:sel?"#ECEDF8":"#fff",color:sel?"#5C5FEF":"#374151",
                    fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",transition:"all .15s",
                    display:"flex",alignItems:"center",gap:6}}>
                  <span>{c.icon}</span>{c.name}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <label style={lbl}>บันทึก (ไม่บังคับ)</label>
          <input placeholder="รายละเอียดเพิ่มเติม…" value={form.note} onChange={e=>set("note",e.target.value)} style={inp}/>
        </div>
        <div style={{marginBottom:24}}>
          <label style={lbl}>วันที่</label>
          <input type="date" value={form.date} onChange={e=>set("date",e.target.value)} style={inp}/>
        </div>

        <button onClick={handleAdd}
          style={{width:"100%",padding:"16px",borderRadius:16,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:800,fontSize:16,color:"#fff",
            background:"linear-gradient(135deg,#5C5FEF,#8B5CF6)",boxShadow:"0 4px 20px rgba(92,95,239,.35)"}}>
          บันทึกรายการ
        </button>
      </div>
    </div>
  );
}

  const balance=income-expense;
  const pct=income>0?(expense/income)*100:0;
  const recent=[...transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return(
    <div style={{padding:"0 16px"}}>

          <div style={{background:"rgba(255,255,255,.15)",borderRadius:16,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:4}}>💰 รายรับ</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>฿{fmtS(income)}</div>
          </div>
          <div style={{background:"rgba(255,255,255,.15)",borderRadius:16,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:4}}>💸 รายจ่าย</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>฿{fmtS(expense)}</div>
          </div>
        </div>
      </div>
      <div style={{...card,padding:"20px 24px",marginBottom:16,display:"flex",alignItems:"center",gap:20}}>
        <div style={{position:"relative",flexShrink:0}}>
          <Donut pct={pct} size={110}/>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:900,color:"#1A1D2E"}}>{pct.toFixed(0)}%</div>
            <div style={{fontSize:10,color:"#9CA3AF"}}>ใช้ไป</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#9CA3AF",marginBottom:4}}><span>รายจ่าย</span><span style={{color:"#EF4444"}}>฿{fmtS(expense)}</span></div>
            <div style={{height:8,background:"#FEE2E2",borderRadius:99}}><div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:"#FF6B8A",borderRadius:99}}/></div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#9CA3AF",marginBottom:4}}><span>รายรับ</span><span style={{color:"#5C5FEF"}}>฿{fmtS(income)}</span></div>
            <div style={{height:8,background:"#EEF0FB",borderRadius:99}}><div style={{height:"100%",width:"100%",background:"#5C5FEF",borderRadius:99}}/></div>
          </div>
        </div>
      </div>
      <div style={{fontWeight:800,fontSize:15,color:"#1A1D2E",marginBottom:12}}>รายการล่าสุด</div>
      {recent.length===0
        ?<div style={{...card,padding:"40px 20px",textAlign:"center",color:"#C4C9D9"}}><div style={{fontSize:36}}>📭</div><div style={{marginTop:8}}>กดปุ่ม + เพื่อเพิ่มรายการ</div></div>
        :recent.map(tx=><TxCard key={tx.id} tx={tx} onDelete={null}/>)
      }
    </div>
  );
}

// ── LIST TAB ──────────────────────────────────────────────────
function ListTab({transactions,onDelete}){
  const [fType,setFType]=useState("all");
  const [fMonth,setFMonth]=useState("all");
  const months=useMemo(()=>{const s=new Set(transactions.map(t=>t.date.slice(0,7)));return Array.from(s).sort().reverse();},[transactions]);
  const list=useMemo(()=>transactions.filter(t=>(fType==="all"||t.type===fType)&&(fMonth==="all"||t.date.startsWith(fMonth))).sort((a,b)=>b.date.localeCompare(a.date)),[transactions,fType,fMonth]);
  const sInc=list.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const sExp=list.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  return(
    <div style={{padding:"0 16px"}}>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {[["all","ทั้งหมด"],["income","รายรับ"],["expense","รายจ่าย"]].map(([k,v])=>(
          <button key={k} onClick={()=>setFType(k)} style={pill(fType===k)}>{v}</button>
        ))}
        <select value={fMonth} onChange={e=>setFMonth(e.target.value)}
          style={{padding:"7px 12px",borderRadius:99,border:"1.5px solid #E5E7EB",fontSize:13,fontFamily:"inherit",background:"#fff",color:"#374151",cursor:"pointer"}}>
          <option value="all">ทุกเดือน</option>
          {months.map(m=>{const[y,mo]=m.split("-");return<option key={m} value={m}>{MONTHS[+mo-1]} {+y+543}</option>;})}
        </select>
      </div>
      {list.length>0&&(
        <div style={{...card,padding:"12px 16px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:"#22C55E",fontWeight:700}}>+฿{fmt(sInc)}</span>
          <span style={{fontSize:13,color:"#9CA3AF"}}>{list.length} รายการ</span>
          <span style={{fontSize:13,color:"#EF4444",fontWeight:700}}>-฿{fmt(sExp)}</span>
        </div>
      )}
      {list.length===0
        ?<div style={{...card,padding:"60px 20px",textAlign:"center",color:"#C4C9D9"}}><div style={{fontSize:40}}>🔍</div><div style={{marginTop:8}}>ไม่พบรายการ</div></div>
        :list.map(tx=><TxCard key={tx.id} tx={tx} onDelete={onDelete}/>)
      }
    </div>
  );
}

// ── SUMMARY TAB ───────────────────────────────────────────────
function SummaryTab({transactions}){
  const [fMonth,setFMonth]=useState("all");
  const months=useMemo(()=>{const s=new Set(transactions.map(t=>t.date.slice(0,7)));return Array.from(s).sort().reverse();},[transactions]);
  const filtered=useMemo(()=>fMonth==="all"?transactions:transactions.filter(t=>t.date.startsWith(fMonth)),[transactions,fMonth]);
  const income=filtered.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=filtered.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const catMap=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{if(!m[t.category])m[t.category]={icon:t.icon,inc:0,exp:0};m[t.category][t.type==="income"?"inc":"exp"]+=t.amount;});
    return Object.entries(m).map(([cat,v])=>({cat,...v,total:v.inc+v.exp})).sort((a,b)=>b.total-a.total);
  },[filtered]);
  const maxTotal=catMap[0]?.total||1;
  return(
    <div style={{padding:"0 16px"}}>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <button onClick={()=>setFMonth("all")} style={pill(fMonth==="all")}>ทั้งปี</button>
        {months.map(m=>{const[y,mo]=m.split("-");return<button key={m} onClick={()=>setFMonth(m)} style={pill(fMonth===m)}>{MONTHS[+mo-1]} {+y+543}</button>;})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        {[["💰 รายรับ",income,"#F0FDF4","#22C55E"],["💸 รายจ่าย",expense,"#FFF0F3","#EF4444"]].map(([label,val,bg,fg])=>(
          <div key={label} style={{...card,padding:"16px 18px",background:bg,border:`1.5px solid ${fg}22`}}>
            <div style={{fontSize:12,color:fg,fontWeight:700,marginBottom:4}}>{label}</div>
            <div style={{fontSize:22,fontWeight:900,color:fg}}>฿{fmtS(val)}</div>
          </div>
        ))}
      </div>
      <div style={{...card,padding:"16px 18px",marginBottom:16,background:income-expense>=0?"#EEF0FB":"#FFF0F3"}}>
        <div style={{fontSize:12,fontWeight:700,color:income-expense>=0?"#5C5FEF":"#EF4444"}}>📊 ยอดสุทธิ</div>
        <div style={{fontSize:28,fontWeight:900,color:income-expense>=0?"#5C5FEF":"#EF4444"}}>฿{fmt(income-expense)}</div>
      </div>
      {catMap.length>0&&(
        <div style={{...card,padding:"20px 18px",marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:14,color:"#1A1D2E",marginBottom:16}}>สรุปตามหมวดหมู่</div>
          {catMap.map(({cat,icon,inc,exp,total})=>(
            <div key={cat} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:13,color:"#374151"}}>{icon} {cat}</span>
                <span style={{fontSize:13,fontWeight:700,color:inc>exp?"#5C5FEF":"#FF6B8A"}}>฿{fmtS(total)}</span>
              </div>
              <div style={{height:7,background:"#F0F2F8",borderRadius:99}}>
                <div style={{height:"100%",width:`${(total/maxTotal)*100}%`,background:inc>exp?"#5C5FEF":"#FF6B8A",borderRadius:99,transition:"width .5s"}}/>
              </div>
              <div style={{display:"flex",gap:12,marginTop:4,fontSize:11}}>
                {inc>0&&<span style={{color:"#22C55E"}}>+฿{fmtS(inc)}</span>}
                {exp>0&&<span style={{color:"#EF4444"}}>-฿{fmtS(exp)}</span>}
              </div>
            </div>
          ))}
        </div>
      )}
      {months.length>1&&(
        <div style={{...card,padding:"20px 18px",marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:14,color:"#1A1D2E",marginBottom:14}}>สรุปรายเดือน</div>
          {months.map(m=>{
            const[y,mo]=m.split("-");
            const mTx=transactions.filter(t=>t.date.startsWith(m));
            const mInc=mTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
            const mExp=mTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
            const mBal=mInc-mExp;
            return(
              <div key={m} style={{paddingBottom:14,marginBottom:14,borderBottom:"1px solid #F0F2F8"}}>
                <div style={{fontWeight:700,color:"#374151",marginBottom:8}}>{MONTHS[+mo-1]} {+y+543}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  <div><div style={{fontSize:11,color:"#9CA3AF"}}>รายรับ</div><div style={{fontSize:13,fontWeight:700,color:"#22C55E"}}>฿{fmtS(mInc)}</div></div>
                  <div><div style={{fontSize:11,color:"#9CA3AF"}}>รายจ่าย</div><div style={{fontSize:13,fontWeight:700,color:"#EF4444"}}>฿{fmtS(mExp)}</div></div>
                  <div><div style={{fontSize:11,color:"#9CA3AF"}}>คงเหลือ</div><div style={{fontSize:13,fontWeight:700,color:mBal>=0?"#5C5FEF":"#EF4444"}}>฿{fmtS(mBal)}</div></div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [transactions,setTransactions]=useState(()=>load("bt_txns",[]));
  const [cats,setCats]=useState(()=>load("bt_cats",DEFAULT_CATS));
  const [tab,setTab]=useState("home");
  const [showAdd,setShowAdd]=useState(false);

  useEffect(()=>save("bt_txns",transactions),[transactions]);
  useEffect(()=>save("bt_cats",cats),[cats]);

  const addTx=tx=>setTransactions(p=>[tx,...p]);
  const delTx=id=>setTransactions(p=>p.filter(t=>t.id!==id));

  const TABS=[
    {key:"home",icon:"🏠",label:"หน้าหลัก"},
    {key:"list",icon:"📋",label:"รายการ"},
    {key:"summary",icon:"📊",label:"สรุป"},
    {key:"cats",icon:"🗂",label:"หมวดหมู่"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#F0F2F8",fontFamily:"'Sarabun',sans-serif",paddingBottom:90}}>
      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #F0F2F8",padding:"16px 20px 14px",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#9CA3AF",letterSpacing:1.5,fontWeight:700}}>BUDGET TRACKER</div>
            <div style={{fontSize:20,fontWeight:900,color:"#1A1D2E"}}>บัญชีรายรับรายจ่าย</div>
          </div>
          <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#5C5FEF,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💰</div>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:520,margin:"0 auto",paddingTop:16}}>
        {tab==="home"&&<HomeTab transactions={transactions}/>}
        {tab==="list"&&<ListTab transactions={transactions} onDelete={delTx}/>}
        {tab==="summary"&&<SummaryTab transactions={transactions}/>}
        {tab==="cats"&&<ManageCatsTab cats={cats} setCats={setCats}/>}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #F0F2F8",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,.06)"}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex",alignItems:"center",padding:"6px 0 12px"}}>
          {TABS.slice(0,2).map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"8px 0"}}>
              <span style={{fontSize:22,filter:tab===t.key?"none":"grayscale(1) opacity(.45)"}}>{t.icon}</span>
              <span style={{fontSize:11,fontWeight:700,fontFamily:"inherit",color:tab===t.key?"#5C5FEF":"#9CA3AF"}}>{t.label}</span>
            </button>
          ))}

          {/* FAB */}
          <div style={{flex:1,display:"flex",justifyContent:"center"}}>
            <button onClick={()=>setShowAdd(true)}
              style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#5C5FEF,#8B5CF6)",border:"4px solid #F0F2F8",color:"#fff",fontSize:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(92,95,239,.45)",marginTop:-16}}>
              +
            </button>
          </div>

          {TABS.slice(2).map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"8px 0"}}>
              <span style={{fontSize:22,filter:tab===t.key?"none":"grayscale(1) opacity(.45)"}}>{t.icon}</span>
              <span style={{fontSize:11,fontWeight:700,fontFamily:"inherit",color:tab===t.key?"#5C5FEF":"#9CA3AF"}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {showAdd&&<AddSheet cats={cats} onClose={()=>setShowAdd(false)} onAdd={addTx}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
